language: de
sphinx: true
extensions:
  - sphinx_panels, sphinx.ext.ifconfig, sphinx.ext.intersphinx, sphinx.ext.mathjax, sphinx.ext.todo, sphinxcontrib.bibtex, sphinxcontrib.actdiag, sphinx_git, subfig, figtable
default_domain: py
consecutive_numbering: true
colon_fences: true
dollar_math: true
conversions:
  sphinx_panels.dropdpwn.DropdownDirective: parse_all