image: alpine

pages:
  script:
  - apk --no-cache add file git py3-pip python-dev imagemagick
  - convert --version
  - pip3 install sphinx sphinxcontrib.bibtex sphinx_git
  - apk --no-cache add make
  - git checkout snapshot
  - make html
  - mv Export/snapshot/html public
  artifacts:
    name: "$CI_JOB_NAME-$CI_COMMIT_REF_NAME"
    expire_in: 1 week
    paths:
    - public
  only:
  - snapshot

